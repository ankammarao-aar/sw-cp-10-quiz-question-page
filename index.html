<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Question Page</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>
<body>
    <div class="quiz-bg-container">
        <h1 class="quiz-score-heading">Score: 25/45</h1>
        <div class="question-card">
            <h1 class="question-heading">Question 10</h1>
            <p class="para">Which of the following is the content of the HTML paragraph element?</p>
            <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/coding-question-img.png" class="code-img" />
        </div>
        <div class="questions-options-card">
            <ul class="unordered-list-card">
                <button class="option">A. HTML heading element</button>
                <button class="option">B. HTML paragraph element</button>
                <li class="correct-option">C. This is paragraph...</li>
                <button class="option">D. None of the given options</button>
            </ul>
            <button class="submit-button">Submit</button>
        </div>
    </div>
</body>
</html>
